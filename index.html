<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark navbar-copa">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Copa Store Oficial</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu1.html">Sobre Nós</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu2.html">Fale Conosco</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu3.html">Dicas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="text-center text-white p-5 fundo-topo">
        <div class="container">
            <h1 class="display-5 fw-bold">Produtos Copa do Mundo FIFA 2026</h1>
            <p class="lead">Camisas, acessórios, bonés, chuteiras e muito mais.</p>
        </div>
    </header>
    
    <main class="container my-4">
        <section class="mb-4"> <!-- Carrosel -->
            <div id="carouselCopa" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner rounded shadow">

                    <div class="carousel-item active">
                        <img src="assets/img/camisas.jpg" class="d-block w-100 imagem-carrossel" alt="Camisa da Copa do Mundo 2026">
                    </div>

                    <div class="carousel-item active">
                        <img src="assets/img/total90.jpeg" class="d-block w-100 imagem-carrossel" alt="Chuteira Nike">
                    </div>

                    <div class="carousel-item active">
                        <img src="assets/img/jabulani.jpeg" class="d-block w-100 imagem-carrossel" alt="Bola Copa do Mundo 2026">
                    </div>

                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselCopa" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselCopa" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </section>

        <section class="card p-3 mb-4 shadow-sm"> <!-- Pesquisa e Filtro -->
            <div class="row g-3">
                <div class="col-md-8">
                    <label for="pesquisa" class="form-label">Pesquisa de Produto</label>
                    <input type="text" id="pesquisa" class="form-control" placeholder="Digite o nome do produto">
                </div>

                <div class="col-md-4">
                    <label for="filtroCategoria" class="form-label">Filtrar por categoria</label>
                    <select id="filtroCategoria" class="form-select">
                        <option value="todos">Todos</option>
                        <option value="Camisas">Camisas</option>
                        <option value="Acessórios">Acessórios</option>
                        <option value="Bonés">Bonés</option>
                        <option value="Chuteiras">Chuteiras</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
            </div>
        </section>

        <section> <!-- Produtos -->
            <h2 class="mb-3">Catálogo de Produtos</h2>
            <div id="listaProdutos" class="row g-4"></div>
        </section>

        <section class="card p-3 mt-5 shadow"> <!-- Carrinho -->
            <h2>Carrinho de Compras</h2>
            
            <div id="listaCarrinho"></div>
            <hr>
            <h4>Total: R$ <span id="totalCarrinho">0,00</span></h4>
            <div id="paypal-button-container" class="mt-3"></div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">&copy; 2026 Copa Store 2026 - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=BRL"></script>

    <script src="script.js"></script>
</body>
</html>
