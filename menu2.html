<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fale Conosco</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-copa">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Copa Store 2026</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Catálogo</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="menu1.html">Nossa História</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="menu2.html">Fale Conosco</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="menu3.html">Dicas</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <section class="card p-4 shadow">
        <h1>Fale Conosco</h1>

        <form>
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input
              type="text"
              class="form-control"
              placeholder="Digite seu nome"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input
              type="email"
              class="form-control"
              placeholder="Digite seu e-mail"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea
              class="form-control"
              rows="4"
              placeholder="Digite sua mensagem"
            ></textarea>
          </div>

          <button type="button" class="btn btn-success">Enviar</button>
        </form>
      </section>
    </main>

    <footer class="bg-dark text-white text-center p-3">
      <p class="mb-0">
        &copy; 2026 Copa Store 2026 - Todos os direitos reservados.
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
