<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-copa">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Copa Store 2026</a>
      </div>
    </nav>

    <main class="container my-5">
      <section class="card p-4 shadow">
        <h1>Cadastro de Produto</h1>

        <form>
          <div class="mb-3">
            <label class="form-label">Nome do produto</label>
            <input type="text" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Preço</label>
            <input type="number" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select">
              <option>Camisas</option>
              <option>Acessórios</option>
              <option>Bonés</option>
              <option>Chuteiras</option>
              <option>Outros</option>
            </select>
          </div>

          <button type="button" class="btn btn-success">Cadastrar</button>
        </form>
      </section>
    </main>

    <footer class="bg-dark text-white text-center p-3">
      <p class="mb-0">
        &copy; 2026 Copa Store 2026 - Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
